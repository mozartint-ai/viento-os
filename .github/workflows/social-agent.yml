name: Viento Social Agent

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do not create Buffer posts; only generate and upload media"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    # 09:00 Europe/Istanbul
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3.6-flash' }}
      SOCIAL_ASSET_TYPE: ${{ vars.SOCIAL_ASSET_TYPE || 'image' }}
      SOCIAL_AGENT_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Run social agent
        run: node scripts/social-agent.mjs
